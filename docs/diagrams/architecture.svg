<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 660" width="860" height="660">
  <defs>
    <marker id="ah-down" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <polygon points="0 0,8 0,4 6" fill="#555"/>
    </marker>
    <marker id="ah-up" markerWidth="8" markerHeight="6" refX="4" refY="0" orient="auto">
      <polygon points="0 6,8 6,4 0" fill="#0a7c5c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="660" fill="#ffffff"/>

  <!-- Title -->
  <text text-anchor="middle" fill="#1e1e2e" font-size="22" font-family="system-ui,sans-serif" font-weight="700">
    <tspan x="430" y="36">System Architecture</tspan>
  </text>

  <!-- Layer labels (left gutter) -->
  <text fill="#999" font-size="10" font-family="system-ui,sans-serif" font-weight="600" transform="rotate(-90,14,160)">
    <tspan text-anchor="middle">FRAMEWORK</tspan>
  </text>
  <text fill="#999" font-size="10" font-family="system-ui,sans-serif" font-weight="600" transform="rotate(-90,14,290)">
    <tspan text-anchor="middle">SHARED UI</tspan>
  </text>
  <text fill="#999" font-size="10" font-family="system-ui,sans-serif" font-weight="600" transform="rotate(-90,14,450)">
    <tspan text-anchor="middle">COMPONENTS</tspan>
  </text>
  <text fill="#999" font-size="10" font-family="system-ui,sans-serif" font-weight="600" transform="rotate(-90,14,590)">
    <tspan text-anchor="middle">DATA</tspan>
  </text>

  <!-- ═══ Layer 1: Framework ═══ -->
  <rect x="26" y="56" width="814" height="122" rx="8" fill="#ffd8a8" fill-opacity="0.35" stroke="#e67700" stroke-width="1.5"/>
  <text text-anchor="middle" fill="#b05f00" font-size="13" font-family="system-ui,sans-serif" font-weight="700">
    <tspan x="433" y="73">Framework</tspan>
  </text>

  <!-- Next.js box -->
  <rect x="36" y="82" width="178" height="84" rx="6" fill="#fff7e6" stroke="#e67700" stroke-width="1.2"/>
  <text text-anchor="middle" fill="#b05f00" font-size="13" font-family="system-ui,sans-serif" font-weight="600">
    <tspan x="125" y="100">Next.js 16</tspan>
  </text>
  <text text-anchor="middle" fill="#555" font-size="12" font-family="system-ui,sans-serif">
    <tspan x="125" y="118">App Router</tspan>
    <tspan x="125" dy="17">React Compiler (auto-memo)</tspan>
  </text>

  <!-- React 19 box -->
  <rect x="224" y="82" width="178" height="84" rx="6" fill="#e7f5ff" stroke="#339af0" stroke-width="1.2"/>
  <text text-anchor="middle" fill="#1971c2" font-size="13" font-family="system-ui,sans-serif" font-weight="600">
    <tspan x="313" y="100">React 19</tspan>
  </text>
  <text text-anchor="middle" fill="#555" font-size="12" font-family="system-ui,sans-serif">
    <tspan x="313" y="118">Server + Client Components</tspan>
    <tspan x="313" dy="17">"use client" boundaries</tspan>
  </text>

  <!-- ThemeProvider box -->
  <rect x="412" y="82" width="206" height="84" rx="6" fill="#f3f0ff" stroke="#7048e8" stroke-width="1.2"/>
  <text text-anchor="middle" fill="#4a2fa0" font-size="13" font-family="system-ui,sans-serif" font-weight="600">
    <tspan x="515" y="100">ThemeProvider</tspan>
  </text>
  <text text-anchor="middle" fill="#555" font-size="12" font-family="system-ui,sans-serif">
    <tspan x="515" y="118">dark/light Context</tspan>
    <tspan x="515" dy="17">localStorage persistence</tspan>
  </text>

  <!-- Tailwind box -->
  <rect x="628" y="82" width="206" height="84" rx="6" fill="#ebfbee" stroke="#0ca678" stroke-width="1.2"/>
  <text text-anchor="middle" fill="#0a7c5c" font-size="13" font-family="system-ui,sans-serif" font-weight="600">
    <tspan x="731" y="100">Tailwind CSS v4</tspan>
  </text>
  <text text-anchor="middle" fill="#555" font-size="12" font-family="system-ui,sans-serif">
    <tspan x="731" y="118">CSS-only config</tspan>
    <tspan x="731" dy="17">globals.css tokens</tspan>
  </text>

  <!-- Arrow: Framework → Shared UI -->
  <polyline points="433,178 433,212" fill="none" stroke="#555" stroke-width="1.8" marker-end="url(#ah-down)"/>

  <!-- ═══ Layer 2: Shared UI ═══ -->
  <rect x="26" y="214" width="814" height="76" rx="8" fill="#e9ecef" fill-opacity="0.8" stroke="#495057" stroke-width="1.5"/>
  <text fill="#212529" font-size="13" font-family="system-ui,sans-serif" font-weight="700">
    <tspan x="40" y="232">Shared UI</tspan>
  </text>
  <text text-anchor="middle" fill="#212529" font-size="13" font-family="system-ui,sans-serif" font-weight="600">
    <tspan x="433" y="245">HeaderNavigation</tspan>
  </text>
  <text text-anchor="middle" fill="#555" font-size="12" font-family="system-ui,sans-serif">
    <tspan x="433" y="263">sticky top bar  ·  theme toggle  ·  mobile hamburger + portal overlay  ·  active-route highlight</tspan>
  </text>

  <!-- Arrow: Shared UI → Components -->
  <polyline points="433,290 433,318" fill="none" stroke="#555" stroke-width="1.8" marker-end="url(#ah-down)"/>

  <!-- ═══ Layer 3: UI Components ═══ -->
  <rect x="26" y="320" width="814" height="240" rx="8" fill="#dbe4ff" fill-opacity="0.25" stroke="#1c7ed6" stroke-width="1.5"/>
  <text fill="#1971c2" font-size="13" font-family="system-ui,sans-serif" font-weight="700">
    <tspan x="40" y="338">UI Components</tspan>
  </text>

  <!-- Left: Home page box -->
  <rect x="36" y="344" width="388" height="204" rx="6" fill="#a5d8ff" fill-opacity="0.4" stroke="#339af0" stroke-width="1.2"/>
  <text text-anchor="middle" fill="#1971c2" font-size="13" font-family="system-ui,sans-serif" font-weight="600">
    <tspan x="230" y="362">Home page</tspan>
  </text>

  <!-- Home: sidebar column -->
  <rect x="46" y="370" width="182" height="166" rx="4" fill="#ffffff" fill-opacity="0.6" stroke="#339af0" stroke-width="1" stroke-dasharray="4 2"/>
  <text text-anchor="middle" fill="#1971c2" font-size="11" font-family="system-ui,sans-serif" font-weight="600">
    <tspan x="137" y="384">Sidebar (fixed, desktop)</tspan>
  </text>
  <text text-anchor="middle" fill="#333" font-size="11" font-family="system-ui,sans-serif">
    <tspan x="137" y="400">HeroSection</tspan>
    <tspan x="137" dy="16">HomeNavigation</tspan>
    <tspan x="137" dy="14">  IntersectionObserver scroll-spy</tspan>
    <tspan x="137" dy="14">SocialLinks</tspan>
    <tspan x="137" dy="16">MouseGlow</tspan>
    <tspan x="137" dy="14">  rAF-throttled, desktop only</tspan>
  </text>

  <!-- Home: main content column -->
  <rect x="236" y="370" width="178" height="166" rx="4" fill="#ffffff" fill-opacity="0.6" stroke="#339af0" stroke-width="1" stroke-dasharray="4 2"/>
  <text text-anchor="middle" fill="#1971c2" font-size="11" font-family="system-ui,sans-serif" font-weight="600">
    <tspan x="325" y="384">Main Content (scrollable)</tspan>
  </text>
  <text text-anchor="middle" fill="#333" font-size="11" font-family="system-ui,sans-serif">
    <tspan x="325" y="400">AboutSection</tspan>
    <tspan x="325" dy="16">ExperiencesSection</tspan>
    <tspan x="325" dy="16">ProjectsSection</tspan>
    <tspan x="325" dy="14">  next/image, 5 projects</tspan>
    <tspan x="325" dy="16">Footer</tspan>
  </text>

  <!-- Right: Tech Stack page box -->
  <rect x="436" y="344" width="394" height="204" rx="6" fill="#a5d8ff" fill-opacity="0.4" stroke="#339af0" stroke-width="1.2"/>
  <text text-anchor="middle" fill="#1971c2" font-size="13" font-family="system-ui,sans-serif" font-weight="600">
    <tspan x="633" y="362">Tech Stack page</tspan>
  </text>
  <rect x="446" y="370" width="374" height="166" rx="4" fill="#ffffff" fill-opacity="0.6" stroke="#339af0" stroke-width="1" stroke-dasharray="4 2"/>
  <text text-anchor="middle" fill="#1971c2" font-size="11" font-family="system-ui,sans-serif" font-weight="600">
    <tspan x="633" y="384">TechStackGrid  ("use client")</tspan>
  </text>
  <text text-anchor="middle" fill="#333" font-size="11" font-family="system-ui,sans-serif">
    <tspan x="633" y="400">IntersectionObserver scrollspy nav</tspan>
    <tspan x="633" dy="16">mobile hide-on-scroll behaviour</tspan>
    <tspan x="633" dy="16">12 categories  ·  30+ tools</tspan>
    <tspan x="633" dy="16">brand icons via react-icons</tspan>
    <tspan x="633" dy="16">linked cards (homepage + docs)</tspan>
  </text>

  <!-- Arrow: Components → Data (pointing up from data to components) -->
  <polyline points="433,560 433,592" fill="none" stroke="#0a7c5c" stroke-width="1.8" marker-end="url(#ah-down)"/>
  <text text-anchor="middle" fill="#0a7c5c" font-size="11" font-family="system-ui,sans-serif">
    <tspan x="468" y="580">import</tspan>
  </text>

  <!-- ═══ Layer 4: Static Data ═══ -->
  <rect x="26" y="594" width="814" height="52" rx="8" fill="#c3fae8" fill-opacity="0.8" stroke="#0ca678" stroke-width="1.5"/>
  <text fill="#0a7c5c" font-size="13" font-family="system-ui,sans-serif" font-weight="700">
    <tspan x="40" y="613">Static Data  (TypeScript)</tspan>
  </text>
  <text text-anchor="middle" fill="#333" font-size="12" font-family="system-ui,sans-serif">
    <tspan x="490" y="628">src/data/home/  hero · experience · project · social · about</tspan>
    <tspan x="490" dy="16">src/data/techstack/  tech-stack-data  (TechCategory[], brand icons)</tspan>
  </text>
</svg>
